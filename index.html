<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mboka Doba</title>

</head>

<body>

    <!-- This is the home page hero banner -->
    <section class="hero">
        <!-- Background image -->
        <div class="hero-bg">
            <img src="MEDIA/toxic_lyrikali.jpg" alt="Hero Background">
        </div>
        <h1>Welcome to Toxic Lyrikali's Website</h1>
        <p>We feed you with the artist's backstory, lyrics and music news.</p>
        <a href="#services" class="btn">Explore Services</a>
    </section>

    <!-- Simple Contact Us -->
    <section id="contact-us">
        <h2>Contact Us</h2>
        <p>Please fill out the form below and we will get back to you as soon as possible.</p>
        <form action="#" method="POST">
            <div>
                <label for="name">Name:</label><br>
                <input id="name" name="name" type="text" required>
            </div>
            <div>
                <label for="email">Email:</label><br>
                <input id="email" name="email" type="email" required>
            </div>
            <div>
                <label for="message">Message:</label><br>
                <textarea id="message" name="message" rows="5" required></textarea>
            </div>
            <div>
                <button type="submit">Send Message</button>
            </div>
        </form>
    </section>
</body>

</html>
